[uwsgi]
# Application settings
module = settings.wsgi:application
chdir = /app
home = /usr/local
pythonpath = /app

# Process settings
master = true
processes = 4
threads = 2
max-requests = 1000
max-requests-delta = 100
harakiri = 300
harakiri-verbose = true

# Socket settings
socket = /app/django.sock
chmod-socket = 666
vacuum = true
die-on-term = true

# Memory and performance
enable-threads = true
single-interpreter = true
lazy-apps = true
buffer-size = 32768

# Logging
logto = /app/logs/uwsgi.log
log-maxsize = 50000000
log-backupname = /app/logs/uwsgi.log.old
logger = file:/app/logs/uwsgi.log

# Stats server (for monitoring)
stats = 127.0.0.1:9191
stats-http = true

# Cheaper subsystem (dynamic process scaling)
cheaper-algo = busyness
cheaper = 1
cheaper-initial = 2
cheaper-overload = 30
cheaper-step = 1
cheaper-busyness-multiplier = 20
cheaper-busyness-min = 10
cheaper-busyness-max = 70
cheaper-busyness-backlog-alert = 16
cheaper-busyness-backlog-step = 2

# Thunder lock
thunder-lock = true

# Offload thread for static files
offload-threads = 2

# Security
uid = appuser
gid = appuser
umask = 002

# Health check
http = :8001
route = ^/uwsgi-status$ uwsgi:
route = ^/uwsgi-stats$ uwsgi: