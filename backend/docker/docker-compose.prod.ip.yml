name: 'pchub_prod'

x-base-api: &base-api
  build:
    context: ..
    dockerfile: Dockerfile.prod
  restart: unless-stopped
  env_file:
    - ../.env
  networks:
    - pchub_network
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  db:
    image: postgres:15.4-alpine
    container_name: pchub_db_prod
    environment:
      POSTGRES_DB: ${DB_NAME:-pchub}
      POSTGRES_USER: ${DB_USER:-pchub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pchub_password123}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
      - ./db_backup:/backup
    restart: unless-stopped
    networks:
      - pchub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pchub_user} -d ${DB_NAME:-pchub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: pchub_redis_prod
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - pchub_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    <<: *base-api
    container_name: pchub_web_prod
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  celery_worker:
    <<: *base-api
    container_name: pchub_celery_worker_prod
    command: celery -A settings worker --loglevel=info --concurrency=4 --max-tasks-per-child=1000
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    <<: *base-api
    container_name: pchub_celery_beat_prod
    command: celery -A settings beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    container_name: pchub_nginx_prod
    ports:
      - "80:80"
    volumes:
      - ./nginx.ip.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - pchub_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  pchub_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
