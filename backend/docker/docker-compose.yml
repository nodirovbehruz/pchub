name: 'pchub'

x-base-api: &base-api
  build:
    context: ..
    dockerfile: Dockerfile
  volumes:
    - ..:/app
  restart: unless-stopped
  env_file:
    - .env

services:
  db:
    image: postgres:15.4-alpine
    container_name: pchub_postgres_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: pchub
      POSTGRES_USER: pchub_user
      POSTGRES_PASSWORD: SecurePassword2024
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pchub}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pchub_redis_db
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: pchub_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

  web:
    <<: *base-api
    container_name: pchub_web
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  celery_worker:
    <<: *base-api
    container_name: pchub_celery_worker
    command: celery -A settings worker --loglevel=info --concurrency=4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "settings", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Beat (Scheduler)
  celery_beat:
    <<: *base-api
    container_name: pchub_celery_beat
    command: celery -A settings beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "celery", "-A", "settings", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: {}
  redis_data: {}
  static_volume: {}
  media_volume: {}